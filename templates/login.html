<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>STELLO — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100vw;min-height:100vh;background:#0a0a0f;color:#fff;font-family:'Syne',sans-serif}

/* BG */
.bg{position:fixed;inset:0;z-index:0;overflow:hidden}
.bg-grad{position:absolute;inset:0;background:radial-gradient(ellipse at 30% 40%,rgba(74,144,255,.09) 0%,transparent 55%),radial-gradient(ellipse at 75% 70%,rgba(120,80,255,.06) 0%,transparent 50%);animation:bgP 8s ease-in-out infinite alternate}
@keyframes bgP{0%{opacity:.5}100%{opacity:1}}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--d,3s) ease-in-out infinite var(--dl,0s)}
@keyframes twinkle{0%,100%{opacity:.1}50%{opacity:.8}}

/* Layout */
.wrap{position:relative;z-index:2;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}

/* Card */
.card{width:100%;max-width:400px;background:rgba(255,255,255,.04);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:36px 28px;display:flex;flex-direction:column;gap:24px;animation:cardIn .6s cubic-bezier(.16,1,.3,1)}
@keyframes cardIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* Brand */
.brand{display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center}
.brand-logo{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,#1a3a8a,#4a90ff);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;box-shadow:0 0 28px rgba(74,144,255,.35);color:#fff}
.brand-name{font-size:24px;font-weight:800;letter-spacing:.1em;background:linear-gradient(135deg,#fff,#80b8ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.brand-sub{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.22em;color:rgba(255,255,255,.32);text-transform:uppercase}

/* Tabs */
.tabs{display:flex;gap:4px;background:rgba(255,255,255,.05);border-radius:10px;padding:4px}
.tab{flex:1;padding:8px 0;border-radius:7px;border:none;font-family:'Syne',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .18s;color:rgba(255,255,255,.38);background:transparent}
.tab.active{background:rgba(255,255,255,.1);color:#fff}

/* Form */
.form{display:flex;flex-direction:column;gap:13px}
.lbl{font-size:10px;font-weight:600;letter-spacing:.1em;color:rgba(255,255,255,.38);text-transform:uppercase;font-family:'DM Mono',monospace;margin-bottom:4px;display:block}
.inp{width:100%;padding:12px 14px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:#fff;font-family:'Syne',sans-serif;font-size:14px;outline:none;transition:all .2s;-webkit-appearance:none}
.inp::placeholder{color:rgba(255,255,255,.22)}
.inp:focus{border-color:rgba(74,144,255,.6);background:rgba(74,144,255,.06);box-shadow:0 0 0 3px rgba(74,144,255,.1)}

/* Buttons */
.btn{width:100%;padding:13px;border-radius:10px;border:none;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .18s;letter-spacing:.03em}
.btn-primary{background:linear-gradient(135deg,#1a3a8a,#4a90ff);color:#fff}
.btn-primary:hover{filter:brightness(1.12);box-shadow:0 4px 18px rgba(74,144,255,.38);transform:translateY(-1px)}
.btn-primary:active{transform:translateY(0)}
.btn-primary:disabled{opacity:.45;cursor:not-allowed;transform:none;filter:none}

.divider{display:flex;align-items:center;gap:10px;color:rgba(255,255,255,.18);font-size:11px;font-family:'DM Mono',monospace}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.09)}

.btn-google{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:#fff;display:flex;align-items:center;justify-content:center;gap:10px}
.btn-google:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2);transform:translateY(-1px)}
.btn-google:active{transform:translateY(0)}
.btn-google:disabled{opacity:.45;cursor:not-allowed;transform:none}

.gicon{width:18px;height:18px;flex-shrink:0}

/* Messages */
.msg{padding:10px 13px;border-radius:8px;font-size:12px;font-family:'DM Mono',monospace;display:none;line-height:1.5}
.msg.err{background:rgba(220,50,50,.1);border:1px solid rgba(220,50,50,.28);color:#ff8888;display:block}
.msg.ok{background:rgba(50,200,100,.1);border:1px solid rgba(50,200,100,.28);color:#88ffb0;display:block}

.forgot{font-size:11px;color:rgba(74,144,255,.65);cursor:pointer;font-family:'DM Mono',monospace;background:none;border:none;text-decoration:underline;text-align:right;width:100%}
.forgot:hover{color:#4a90ff}

.footer{text-align:center;font-size:11px;color:rgba(255,255,255,.18);font-family:'DM Mono',monospace;line-height:1.6}

/* Spinner */
.spin{width:15px;height:15px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .6s linear infinite;display:inline-block;margin-right:7px;vertical-align:middle}
@keyframes sp{to{transform:rotate(360deg)}}

/* ── ONBOARDING OVERLAY ── */
#onboarding{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.85);backdrop-filter:blur(12px);display:none;align-items:center;justify-content:center;padding:20px}
#onboarding.show{display:flex}
.ob-card{width:100%;max-width:380px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:32px 26px;display:flex;flex-direction:column;gap:20px;animation:cardIn .5s ease}
.ob-title{font-size:22px;font-weight:800;text-align:center;background:linear-gradient(135deg,#fff,#80b8ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.ob-sub{font-size:13px;color:rgba(255,255,255,.45);text-align:center;font-family:'DM Mono',monospace;line-height:1.6}
.ob-emoji{font-size:48px;text-align:center}

/* Mobile tweaks */
@media(max-width:480px){
  .card{padding:28px 18px;border-radius:16px}
  .ob-card{padding:26px 18px}
  .brand-name{font-size:22px}
  .btn{padding:14px}
  .inp{padding:13px 12px;font-size:15px}
}
</style>
</head>
<body>

<div class="bg">
  <div class="bg-grad"></div>
  <div id="stars"></div>
</div>

<!-- ── ONBOARDING (shown to new users) ── -->
<div id="onboarding">
  <div class="ob-card">
    <div class="ob-emoji">👋</div>
    <div class="ob-title">Welcome to STELLO</div>
    <div class="ob-sub">Let's set up your personal AI. What should STELLO call you?</div>
    <div>
      <label class="lbl">Your Name</label>
      <input id="obName" class="inp" placeholder="e.g. Alex" maxlength="30" autocomplete="given-name"/>
    </div>
    <button class="btn btn-primary" onclick="finishOnboarding()">Let's go →</button>
  </div>
</div>

<div class="wrap">
  <div class="card">

    <div class="brand">
      <div class="brand-logo">S</div>
      <div class="brand-name">STELLO</div>
      <div class="brand-sub">your personal AI · sign in to continue</div>
    </div>

    <div class="tabs">
      <button class="tab active" id="tLogin" onclick="switchTab('login')">Sign In</button>
      <button class="tab" id="tSignup" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <!-- LOGIN FORM -->
    <div class="form" id="fLogin">
      <div>
        <label class="lbl">Email</label>
        <input type="email" id="lEmail" class="inp" placeholder="you@gmail.com" autocomplete="email"/>
      </div>
      <div>
        <label class="lbl">Password</label>
        <input type="password" id="lPass" class="inp" placeholder="••••••••" autocomplete="current-password"/>
        <button class="forgot" onclick="doForgot()" style="margin-top:6px">Forgot password?</button>
      </div>
      <div class="msg" id="lMsg"></div>
      <button class="btn btn-primary" id="bLogin" onclick="doLogin()">Sign In</button>
      <div class="divider">or</div>
      <button class="btn btn-google" id="bGoogleL" onclick="doGoogle()">
        <svg class="gicon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google
      </button>
    </div>

    <!-- SIGNUP FORM -->
    <div class="form" id="fSignup" style="display:none">
      <div>
        <label class="lbl">Full Name</label>
        <input type="text" id="sName" class="inp" placeholder="Your name" autocomplete="name"/>
      </div>
      <div>
        <label class="lbl">Email</label>
        <input type="email" id="sEmail" class="inp" placeholder="you@gmail.com" autocomplete="email"/>
      </div>
      <div>
        <label class="lbl">Password</label>
        <input type="password" id="sPass" class="inp" placeholder="min. 6 characters" autocomplete="new-password"/>
      </div>
      <div class="msg" id="sMsg"></div>
      <button class="btn btn-primary" id="bSignup" onclick="doSignup()">Create Account</button>
      <div class="divider">or</div>
      <button class="btn btn-google" id="bGoogleS" onclick="doGoogle()">
        <svg class="gicon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google
      </button>
    </div>

    <div class="footer">By signing in you agree to use STELLO responsibly.<br/>Your data stays yours. Always.</div>
  </div>
</div>

<script type="module">
import { initializeApp }    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword,
         signInWithPopup, GoogleAuthProvider, sendPasswordResetEmail,
         onAuthStateChanged, updateProfile }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyCGtUJ6H2YqqSsNG5HJ6jc9cxwzrDqj4Dg",
  authDomain:        "stello-f3108.firebaseapp.com",
  projectId:         "stello-f3108",
  storageBucket:     "stello-f3108.firebasestorage.app",
  messagingSenderId: "220682811608",
  appId:             "1:220682811608:web:2075694e34b0ff380cffad"
};
const ADMIN_EMAIL = "foundationspidey@gmail.com";

const fb       = initializeApp(FIREBASE_CONFIG);
const auth     = getAuth(fb);
const provider = new GoogleAuthProvider();
provider.setCustomParameters({prompt:'select_account'});

// If already logged in → go straight to app
onAuthStateChanged(auth, user => {
  if (user) goToApp(user, false);
});

// ── Helpers ──────────────────────────────────────────────────
function showMsg(id, txt, type='err'){
  const el=document.getElementById(id);
  if(!el)return;
  el.textContent=txt;
  el.className='msg '+type;
}
function clearMsg(id){const el=document.getElementById(id);if(el)el.className='msg';}
function setBtn(id, loading, label){
  const b=document.getElementById(id);if(!b)return;
  b.disabled=loading;
  b.innerHTML=loading?`<span class="spin"></span>Loading...`:label;
}
const ERR={
  'auth/invalid-credential':   'Wrong email or password.',
  'auth/user-not-found':       'No account found. Try signing up.',
  'auth/wrong-password':       'Wrong password.',
  'auth/too-many-requests':    'Too many attempts. Try again later.',
  'auth/invalid-email':        'Invalid email address.',
  'auth/email-already-in-use':'An account with this email already exists.',
  'auth/weak-password':        'Password must be at least 6 characters.',
  'auth/popup-blocked':        'Popup blocked. Allow popups for this site.',
  'auth/popup-closed-by-user': null, // silent
};

// ── Go to app ────────────────────────────────────────────────
function goToApp(user, isNew){
  const name = user.displayName || user.email.split('@')[0];
  const isAdmin = user.email === ADMIN_EMAIL;

  // Save user info
  localStorage.setItem('stello_user', JSON.stringify({
    uid: user.uid, name, email: user.email,
    photo: user.photoURL||'', isAdmin
  }));

  // Set Personal OS with THEIR name (only if not set yet)
  if(!localStorage.getItem('stello_pos')){
    localStorage.setItem('stello_pos', JSON.stringify({
      name, project:'', goals:'', mood:'😐 neutral', streak:0
    }));
  }

  if(isNew && !user.displayName){
    // Show onboarding for new email/pass users
    document.getElementById('onboarding').classList.add('show');
    window._fbUser = user;
  } else {
    window.location.href='/main';
  }
}

// ── Onboarding ───────────────────────────────────────────────
window.finishOnboarding = async function(){
  const name = document.getElementById('obName').value.trim();
  if(!name){document.getElementById('obName').style.borderColor='rgba(220,50,50,.6)';return;}
  // Update Firebase display name
  if(window._fbUser){
    try{ await updateProfile(window._fbUser,{displayName:name}); }catch(e){}
  }
  // Update local storage with real name
  const pos = JSON.parse(localStorage.getItem('stello_pos')||'{}');
  pos.name = name;
  localStorage.setItem('stello_pos', JSON.stringify(pos));
  const usr = JSON.parse(localStorage.getItem('stello_user')||'{}');
  usr.name = name;
  localStorage.setItem('stello_user', JSON.stringify(usr));
  // Send welcome email via backend
  window.location.href='/main';
};

// ── Email Login ──────────────────────────────────────────────
window.doLogin = async function(){
  const email=document.getElementById('lEmail').value.trim();
  const pass=document.getElementById('lPass').value;
  clearMsg('lMsg');
  if(!email||!pass){showMsg('lMsg','Please fill in both fields.');return;}
  setBtn('bLogin',true,'Sign In');
  try{
    const c=await signInWithEmailAndPassword(auth,email,pass);
    goToApp(c.user,false);
  }catch(e){
    const m=ERR[e.code];
    if(m!==null) showMsg('lMsg',m||'Sign in failed. Try again.');
    setBtn('bLogin',false,'Sign In');
  }
};

// ── Email Signup ─────────────────────────────────────────────
window.doSignup = async function(){
  const name=document.getElementById('sName').value.trim();
  const email=document.getElementById('sEmail').value.trim();
  const pass=document.getElementById('sPass').value;
  clearMsg('sMsg');
  if(!name||!email||!pass){showMsg('sMsg','Please fill in all fields.');return;}
  if(pass.length<6){showMsg('sMsg','Password must be at least 6 characters.');return;}
  setBtn('bSignup',true,'Create Account');
  try{
    const c=await createUserWithEmailAndPassword(auth,email,pass);
    await updateProfile(c.user,{displayName:name});
    // Send welcome email
    goToApp(c.user,true);
  }catch(e){
    const m=ERR[e.code];
    if(m!==null) showMsg('sMsg',m||'Sign up failed. Try again.');
    setBtn('bSignup',false,'Create Account');
  }
};

// ── Google Login ─────────────────────────────────────────────
window.doGoogle = async function(){
  try{
    const c=await signInWithPopup(auth,provider);
    // Check if new user
    const isNew=c._tokenResponse?.isNewUser||false;
    if(isNew){
    }
    goToApp(c.user, isNew && !c.user.displayName);
  }catch(e){
    const m=ERR[e.code];
    if(m) showMsg('lMsg',m);
  }
};

// ── Forgot password ──────────────────────────────────────────
window.doForgot = async function(){
  const email=document.getElementById('lEmail').value.trim();
  if(!email){showMsg('lMsg','Enter your email first.');return;}
  try{
    await sendPasswordResetEmail(auth,email);
    showMsg('lMsg','✓ Reset email sent! Check your inbox.','ok');
  }catch(e){
    showMsg('lMsg','Could not send reset email. Check the address.');
  }
};

// Enter key support
document.getElementById('lPass')?.addEventListener('keydown',e=>{if(e.key==='Enter')window.doLogin();});
document.getElementById('sPass')?.addEventListener('keydown',e=>{if(e.key==='Enter')window.doSignup();});
document.getElementById('obName')?.addEventListener('keydown',e=>{if(e.key==='Enter')window.finishOnboarding();});
</script>

<script>
// Tab switch
window.switchTab=function(tab){
  const isL=tab==='login';
  document.getElementById('tLogin').classList.toggle('active',isL);
  document.getElementById('tSignup').classList.toggle('active',!isL);
  document.getElementById('fLogin').style.display=isL?'flex':'none';
  document.getElementById('fSignup').style.display=isL?'none':'flex';
};

// Generate stars
const sc=document.getElementById('stars');
for(let i=0;i<70;i++){
  const s=document.createElement('div');s.className='star';
  const sz=Math.random()*2+.5;
  s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*4}s;--dl:-${Math.random()*4}s;opacity:${Math.random()*.4+.1}`;
  sc.appendChild(s);
}
</script>
</body>
</html>
