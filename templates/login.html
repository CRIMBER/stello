<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>STELLO — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100vw;height:100vh;overflow:hidden;background:#0a0a0f;color:#fff;font-family:'Syne',sans-serif}

/* Animated background */
.bg{position:fixed;inset:0;z-index:0}
.bg-grad{position:absolute;inset:0;background:radial-gradient(ellipse at 30% 40%,rgba(74,144,255,.08) 0%,transparent 50%),radial-gradient(ellipse at 70% 70%,rgba(120,80,255,.06) 0%,transparent 50%);animation:bgPulse 8s ease-in-out infinite alternate}
@keyframes bgPulse{0%{opacity:.5}100%{opacity:1}}

/* Stars */
.stars{position:absolute;inset:0;overflow:hidden}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--d,3s) ease-in-out infinite var(--delay,0s)}
@keyframes twinkle{0%,100%{opacity:.1;transform:scale(1)}50%{opacity:.8;transform:scale(1.3)}}

/* Main container */
.container{position:relative;z-index:2;width:100%;height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}

/* Card */
.card{width:100%;max-width:420px;background:rgba(255,255,255,.04);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:40px 36px;display:flex;flex-direction:column;gap:28px;animation:cardIn .6s cubic-bezier(.16,1,.3,1)}
@keyframes cardIn{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

/* Brand */
.brand{display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center}
.brand-logo{width:56px;height:56px;border-radius:14px;background:linear-gradient(135deg,#1a3a8a,#4a90ff);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:900;box-shadow:0 0 30px rgba(74,144,255,.35)}
.brand-name{font-size:26px;font-weight:800;letter-spacing:.1em;background:linear-gradient(135deg,#fff,#80b8ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.brand-sub{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.25em;color:rgba(255,255,255,.35);text-transform:uppercase}

/* Tabs */
.tabs{display:flex;gap:4px;background:rgba(255,255,255,.05);border-radius:10px;padding:4px}
.tab{flex:1;padding:8px 0;border-radius:7px;border:none;font-family:'Syne',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .18s;color:rgba(255,255,255,.4);background:transparent}
.tab.active{background:rgba(255,255,255,.1);color:#fff}

/* Form */
.form{display:flex;flex-direction:column;gap:14px}
.input-group{display:flex;flex-direction:column;gap:6px}
.input-label{font-size:11px;font-weight:600;letter-spacing:.1em;color:rgba(255,255,255,.4);text-transform:uppercase;font-family:'DM Mono',monospace}
.input-field{width:100%;padding:12px 14px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:#fff;font-family:'Syne',sans-serif;font-size:14px;outline:none;transition:all .2s}
.input-field::placeholder{color:rgba(255,255,255,.25)}
.input-field:focus{border-color:rgba(74,144,255,.6);background:rgba(74,144,255,.06);box-shadow:0 0 0 3px rgba(74,144,255,.1)}

/* Buttons */
.btn-primary{width:100%;padding:13px;border-radius:10px;border:none;background:linear-gradient(135deg,#1a3a8a,#4a90ff);color:#fff;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .18s;letter-spacing:.04em}
.btn-primary:hover{filter:brightness(1.15);box-shadow:0 4px 20px rgba(74,144,255,.4);transform:translateY(-1px)}
.btn-primary:active{transform:translateY(0)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}

.divider{display:flex;align-items:center;gap:12px;color:rgba(255,255,255,.2);font-size:12px;font-family:'DM Mono',monospace}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.1)}

.btn-google{width:100%;padding:13px;border-radius:10px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);color:#fff;font-family:'Syne',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .18s;display:flex;align-items:center;justify-content:center;gap:10px}
.btn-google:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2);transform:translateY(-1px)}
.btn-google:disabled{opacity:.5;cursor:not-allowed;transform:none}
.google-icon{width:18px;height:18px}

/* Error / success */
.msg{padding:10px 14px;border-radius:8px;font-size:13px;font-family:'DM Mono',monospace;display:none}
.msg.error{background:rgba(220,50,50,.1);border:1px solid rgba(220,50,50,.3);color:#ff8080}
.msg.success{background:rgba(50,200,100,.1);border:1px solid rgba(50,200,100,.3);color:#80ffb0}
.msg.show{display:block}

/* Footer */
.footer{text-align:center;font-size:11px;color:rgba(255,255,255,.2);font-family:'DM Mono',monospace;line-height:1.6}

/* Loading spinner */
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:inline-block;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Forgot password */
.forgot{text-align:right;font-size:12px;color:rgba(74,144,255,.7);cursor:pointer;font-family:'DM Mono',monospace;background:none;border:none;text-decoration:underline}
.forgot:hover{color:#4a90ff}
</style>
</head>
<body>

<div class="bg">
  <div class="bg-grad"></div>
  <div class="stars" id="stars"></div>
</div>

<div class="container">
  <div class="card">

    <div class="brand">
      <div class="brand-logo">S</div>
      <div class="brand-name">STELLO</div>
      <div class="brand-sub">your personal AI · sign in to continue</div>
    </div>

    <div class="tabs">
      <button class="tab active" id="tabLogin" onclick="switchTab('login')">Sign In</button>
      <button class="tab" id="tabSignup" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <div class="form" id="formLogin">
      <div class="input-group">
        <label class="input-label">Email</label>
        <input type="email" id="loginEmail" class="input-field" placeholder="you@gmail.com"/>
      </div>
      <div class="input-group">
        <label class="input-label">Password</label>
        <input type="password" id="loginPass" class="input-field" placeholder="••••••••"/>
        <button class="forgot" onclick="forgotPassword()">Forgot password?</button>
      </div>
      <div class="msg" id="loginMsg"></div>
      <button class="btn-primary" id="btnLogin" onclick="emailLogin()">Sign In</button>
      <div class="divider">or</div>
      <button class="btn-google" id="btnGoogle" onclick="googleLogin()">
        <svg class="google-icon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google
      </button>
    </div>

    <div class="form" id="formSignup" style="display:none">
      <div class="input-group">
        <label class="input-label">Full Name</label>
        <input type="text" id="signupName" class="input-field" placeholder="Taufiq"/>
      </div>
      <div class="input-group">
        <label class="input-label">Email</label>
        <input type="email" id="signupEmail" class="input-field" placeholder="you@gmail.com"/>
      </div>
      <div class="input-group">
        <label class="input-label">Password</label>
        <input type="password" id="signupPass" class="input-field" placeholder="min. 6 characters"/>
      </div>
      <div class="msg" id="signupMsg"></div>
      <button class="btn-primary" id="btnSignup" onclick="emailSignup()">Create Account</button>
      <div class="divider">or</div>
      <button class="btn-google" id="btnGoogle2" onclick="googleLogin()">
        <svg class="google-icon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google
      </button>
    </div>

    <div class="footer">
      By signing in you agree to use STELLO responsibly.<br/>
      Your data stays yours. Always.
    </div>

  </div>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword,
         signInWithPopup, GoogleAuthProvider, sendPasswordResetEmail,
         onAuthStateChanged, updateProfile }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// ── Firebase config ──
const firebaseConfig = {
  apiKey:            "AIzaSyCGtUJ6H2YqqSsNG5HJ6jc9cxwzrDqj4Dg",
  authDomain:        "stello-f3108.firebaseapp.com",
  projectId:         "stello-f3108",
  storageBucket:     "stello-f3108.firebasestorage.app",
  messagingSenderId: "220682811608",
  appId:             "1:220682811608:web:2075694e34b0ff380cffad"
};

// ── ADMIN EMAIL (camouflage — nobody sees this) ──
const ADMIN_EMAIL = "foundationspidey@gmail.com";

const firebase = initializeApp(firebaseConfig);
const auth     = getAuth(firebase);
const provider = new GoogleAuthProvider();

// If already logged in → redirect immediately
onAuthStateChanged(auth, user => {
  if (user) redirect(user);
});

function redirect(user) {
  const isAdmin = user.email === ADMIN_EMAIL;
  // Store user info for STELLO to use
  localStorage.setItem('stello_user', JSON.stringify({
    uid:     user.uid,
    name:    user.displayName || user.email.split('@')[0],
    email:   user.email,
    photo:   user.photoURL || '',
    isAdmin: isAdmin,
  }));
  // Redirect to main app
  window.location.href = '/main';
}

function showMsg(id, text, type='error') {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = text;
  el.className = 'msg ' + type + ' show';
}
function hideMsg(id) {
  const el = document.getElementById(id);
  if (el) el.className = 'msg';
}
function setLoading(btnId, loading, text='Sign In') {
  const btn = document.getElementById(btnId);
  if (!btn) return;
  btn.disabled = loading;
  btn.innerHTML = loading ? '<span class="spinner"></span>Loading...' : text;
}

// ── EMAIL LOGIN ──
window.emailLogin = async function() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPass').value;
  hideMsg('loginMsg');
  if (!email || !pass) { showMsg('loginMsg','Please fill in both fields.'); return; }
  setLoading('btnLogin', true, 'Sign In');
  try {
    const cred = await signInWithEmailAndPassword(auth, email, pass);
    redirect(cred.user);
  } catch(e) {
    const msgs = {
      'auth/invalid-credential':    'Wrong email or password.',
      'auth/user-not-found':        'No account found with this email.',
      'auth/wrong-password':        'Wrong password.',
      'auth/too-many-requests':     'Too many attempts. Try again later.',
      'auth/invalid-email':         'Invalid email address.',
    };
    showMsg('loginMsg', msgs[e.code] || 'Sign in failed. Try again.');
    setLoading('btnLogin', false, 'Sign In');
  }
};

// ── EMAIL SIGNUP ──
window.emailSignup = async function() {
  const name  = document.getElementById('signupName').value.trim();
  const email = document.getElementById('signupEmail').value.trim();
  const pass  = document.getElementById('signupPass').value;
  hideMsg('signupMsg');
  if (!name || !email || !pass) { showMsg('signupMsg','Please fill in all fields.'); return; }
  if (pass.length < 6)          { showMsg('signupMsg','Password must be at least 6 characters.'); return; }
  setLoading('btnSignup', true, 'Create Account');
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, pass);
    await updateProfile(cred.user, { displayName: name });
    redirect(cred.user);
  } catch(e) {
    const msgs = {
      'auth/email-already-in-use':  'An account with this email already exists.',
      'auth/invalid-email':         'Invalid email address.',
      'auth/weak-password':         'Password is too weak.',
    };
    showMsg('signupMsg', msgs[e.code] || 'Sign up failed. Try again.');
    setLoading('btnSignup', false, 'Create Account');
  }
};

// ── GOOGLE LOGIN ──
window.googleLogin = async function() {
  try {
    const cred = await signInWithPopup(auth, provider);
    redirect(cred.user);
  } catch(e) {
    if (e.code !== 'auth/popup-closed-by-user') {
      showMsg('loginMsg', 'Google sign-in failed. Try again.');
    }
  }
};

// ── FORGOT PASSWORD ──
window.forgotPassword = async function() {
  const email = document.getElementById('loginEmail').value.trim();
  if (!email) { showMsg('loginMsg','Enter your email first, then click forgot password.'); return; }
  try {
    await sendPasswordResetEmail(auth, email);
    showMsg('loginMsg', '✓ Reset email sent! Check your inbox.', 'success');
  } catch(e) {
    showMsg('loginMsg', 'Could not send reset email. Check the address.');
  }
};

// Enter key on password fields
document.getElementById('loginPass')?.addEventListener('keydown', e => {
  if (e.key === 'Enter') window.emailLogin();
});
document.getElementById('signupPass')?.addEventListener('keydown', e => {
  if (e.key === 'Enter') window.emailSignup();
});
</script>

<script>
// ── Tab switching ──
function switchTab(tab) {
  const isLogin = tab === 'login';
  document.getElementById('tabLogin').classList.toggle('active', isLogin);
  document.getElementById('tabSignup').classList.toggle('active', !isLogin);
  document.getElementById('formLogin').style.display = isLogin ? 'flex' : 'none';
  document.getElementById('formSignup').style.display = isLogin ? 'none' : 'flex';
}

// ── Generate stars ──
const starsEl = document.getElementById('stars');
for (let i = 0; i < 80; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const size = Math.random() * 2 + 0.5;
  s.style.cssText = `
    width:${size}px;height:${size}px;
    left:${Math.random()*100}%;top:${Math.random()*100}%;
    --d:${2+Math.random()*4}s;--delay:-${Math.random()*4}s;
    opacity:${Math.random()*.5+.1}
  `;
  starsEl.appendChild(s);
}
</script>
</body>
</html>
